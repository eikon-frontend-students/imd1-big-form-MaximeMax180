<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Document</title>
  </head>
  <body>
    <div class="custom-zone-deux">
      <p class="title">Pendantif</p>
      <div class="principale-container">
        <div class="label-container-deux">
          <div class="radio-container">
            <div class="frame-quaranteun">
              <p class="soustitre">base (20 euro)</p>

              <form>
                <label>
                  <input type="radio" name="choix" value="option1" />
                  tourne-sol
                </label>
                <br />

                <label>
                  <input type="radio" name="choix" value="option2" />
                  fleur
                </label>
                <br />

                <label>
                  <input type="radio" name="choix" value="option3" />
                  cat
                </label>
                <br />
              </form>
            </div>
          </div>

          <div class="two">
            <div class="one-color-picker">
              <p class="sous">couleurs base (5 €)</p>

              <div class="container-circle">
                <div class="rouge"></div>
                <div class="violet"></div>
                <div class="bleu"></div>
                <div class="orange"></div>
                <div class="vert"></div>
              </div>
            </div>

            <div class="one-color-picker">
              <p class="sous">couleurs ornement (5 €)</p>

              <div class="container-circle">
                <div class="rouge"></div>
                <div class="violet"></div>
                <div class="bleu"></div>
                <div class="orange"></div>
                <div class="vert"></div>
              </div>
            </div>
          </div>
        </div>

        <div class="app">
          <div class="framequatre">
            <img class="img" src="fleurapp.png" alt="" />
          </div>

          <div class="frametrente">
            <p class="total">sous-totale: 30 €</p>
            <a href="chaine.html" class="suivant">suivant</a>
          </div>
        </div>
      </div>
    </div>
    <a class="back" href="index.html">retour</a>
  </body>
</html>
